<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Nolan Cloud Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
  <nav class="bg-blue-800 p-4 shadow mt-0 w-full">
    <div class="container mx-auto flex flex-wrap items-center">
      <div class="flex w-full md:w-1/2 justify-center md:justify-start text-white font-extrabold">
        <a class="text-white no-underline hover:text-white hover:no-underline" href="#">
          <span class="text-2xl pl-2">NCP Dashboard</span>
        </a>
      </div>
      <div class="flex w-full pt-2 content-center justify-between md:w-1/2 md:justify-end">
        <ul class="list-reset flex justify-between flex-1 md:flex-none items-center">
          <li class="mr-3">
            <button id="logout-btn" class="inline-block text-gray-300 no-underline hover:text-white hover:text-underline py-2 px-4">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 mt-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <!-- Instances Section -->
      <div class="bg-white shadow rounded-lg p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">Instances (Containers)</h2>
          <button id="refresh-instances" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded text-sm">Refresh</button>
        </div>
        <div id="instances-list" class="space-y-4">
          <div class="text-gray-500 text-sm">Loading instances...</div>
        </div>
      </div>

      <!-- Storage Section -->
      <div class="bg-white shadow rounded-lg p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">Storage Buckets</h2>
          <button id="refresh-buckets" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded text-sm">Refresh</button>
        </div>
        <div class="mb-4 flex gap-2">
          <input type="text" id="new-bucket-name" placeholder="Bucket Name" class="border rounded px-2 py-1 flex-1 text-sm">
          <button id="create-bucket-btn" class="bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-3 rounded text-sm">Create</button>
        </div>
        <div id="buckets-list" class="space-y-4">
          <div class="text-gray-500 text-sm">Loading buckets...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
